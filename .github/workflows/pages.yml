# Placeholder Pages deploy for the Kurokesu APT archive.
#
# TEMPORARY: serves site/ (a "setup in progress" landing page) so apt.kurokesu.com
# resolves to something while the real publish pipeline (ingest -> aptly -> publish)
# is built. It uses the exact GitHub Actions deployment mechanism the real publish
# workflow will use (upload-pages-artifact + deploy-pages), so getting this green
# also smoke-tests the Pages path end to end.
#
# When the publish pipeline lands, replace this with the real workflow that uploads
# the generated publish/ tree (pool/ + dists/) instead of site/.
#
# Manual-only during development. The placeholder is already deployed and Pages keeps
# serving the last deployment, so dev pushes must not redeploy. Run by hand from the
# Actions tab if the placeholder ever needs refreshing.
name: Deploy Pages (placeholder)

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One writer for the single signed index. cancel-in-progress: false so a queued
# run never aborts an in-flight deploy mid-swap (matches the real publish model).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/configure-pages@v5

      - name: Upload placeholder site
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
