# Kurokesu APT archive - declarative contents (the archive "state").
#
# This file is the single source of truth for what the archive serves. The
# publish pipeline is a stateless full rebuild from this manifest each run, so
# git history of this file is the archive's audit log and rollback mechanism.
#
# Asset filenames are DERIVED, never hand-typed:
#   <source>_<version>_<suite>_<arch>.tar.gz   (on release <tag>)
# A source with `tarball: single` ships one suite-independent tarball instead
# (arch:all packages, e.g. DKMS): <source>_<version>.tar.gz
#
# `version` is the trixie/base Debian version, kept EPOCH-FREE because it derives
# the (epoch-free) asset filename. A package whose .deb carries an epoch (e.g.
# libcamera's 1:) still lists the epoch-free version here; ingest strips the epoch
# from the .deb before validating. A bookworm build's .deb is <version>~bpo12+1
# internally, but the asset filename omits that suffix (the suite token already
# disambiguates) and ingest accepts <version> or <version>~*, so it still validates.
#
# Retention / packaging rebuilds (the source repos publish with `gh release upload
# --clobber`, so a rebuild replaces a tag's assets):
#   - One block per distinct source TAG (retain-all by tag).
#   - On a packaging rebuild, EDIT the block's `version` in place (-1 -> -2).
#     NEVER append a second block for the same tag - the old revision's assets
#     no longer exist and would 404 the build.
#   - Rollback granularity is therefore per-release, not per packaging revision.

defaults:
  architectures: [arm64]
  component: main
  origin: Kurokesu
  suites: [bookworm, trixie]

# `repo` is required per source. `architectures` and `suites` are optional and
# describe that repo's build matrix (e.g. a source that never ships armhf, or only
# builds trixie). Resolution precedence for both is: release block > source > defaults.
sources:
  libcamera:       { repo: Kurokesu/libcamera }
  rpicam-apps:     { repo: Kurokesu/rpicam-apps }
  ar0822-rpi-dkms: { repo: Kurokesu/ar0822-rpi-driver, tarball: single }

# One block per distinct source tag. `suites` / `architectures` may override the
# source/defaults for that single tag - use this for a cutover, e.g. freeze older
# tags to [arm64] once a source starts shipping armhf from a later release.
releases:
  - { source: libcamera,       tag: v0.7.1+rpt20260429+krks1, version: "0.7.1+rpt20260429+krks1-4", suites: [bookworm, trixie] }
  - { source: rpicam-apps,     tag: v1.12.0+krks1,            version: "1.12.0+krks1-3",            suites: [bookworm, trixie] }
  - { source: ar0822-rpi-dkms, tag: v0.1.0,                   version: "0.1.0-1" }
