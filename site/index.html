<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Kurokesu APT Archive</title>
  <style>
    :root { color-scheme: light; --accent: #ca2031; --ink: #1f2328; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #ffffff;
      color: var(--ink);
      line-height: 1.6;
      padding: 2rem;
    }
    main {
      max-width: 40rem;
      width: 100%;
    }
    .logo {
      width: 260px;
      max-width: 72%;
      height: auto;
      display: block;
      margin-bottom: 1.25rem;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin: 0 0 0.25rem;
      color: var(--ink);
    }
    .tag {
      display: inline-block;
      font-size: 0.75rem;
      padding: 0.15rem 0.5rem;
      border: 1px solid var(--accent);
      border-radius: 999px;
      color: var(--accent);
      background: rgba(202, 32, 49, 0.07);
      margin-bottom: 1.5rem;
    }
    p { margin: 0 0 1rem; color: #3d444d; }
    code {
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
      background: #f3f4f6;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      padding: 0.1rem 0.4rem;
      font-size: 0.85em;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <main>
    <img class="logo" src="Full_name_logo.png" alt="Kurokesu">
    <h1>APT Package Archive</h1>
    <span class="tag">setup in progress</span>
    <p>
      Signed Debian/Ubuntu packages for Kurokesu camera software.
    </p>
    <p>
      Repository is being set up. When it goes live you'll be able to
      <code>apt install</code> and <code>apt upgrade</code> Kurokesu packages
      directly from here.
    </p>
  </main>
</body>
</html>
